<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Transformer.io</title>

<style>
  body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: Arial, sans-serif;
  }

  .logo {
    position: absolute;
    top: 20px;
    left: 20px;
  }

  .logo img {
    height: 45px;
    width: auto;
  }

  .center-box {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .prompt {
    width: 500px;
    padding: 15px;
    background: transparent;
    border: 1px solid #fff;
    color: #fff;
    outline: none;
    font-size: 16px;
  }
</style>
</head>

<body>

<div class="logo">
  <img src="logo.png" alt="Transformer.io Logo">
</div>

<div class="center-box">
  <input class="prompt" placeholder="Type something...">
</div>

</body>
</html>
